services:
  plushdb:
    build: .
    ports:
      - "3000:3000"
    environment:
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in a .env file}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in a .env file}
    volumes:
      - plushdb-data:/app/data
    restart: unless-stopped

volumes:
  plushdb-data:
